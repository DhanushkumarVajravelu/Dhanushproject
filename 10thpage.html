<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Groups</title>
    <style>
    /* 1. Waterfall Background - Covers whole screen */
    body {
      background-image: url('https://www.shutterstock.com/shutterstock/videos/1008944816/thumb/1.jpg?ip=x480');
      background-size: cover;
      background-attachment: fixed;
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center; 
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 2. Glassmorphism Box - Responsive for PC & Phone */
    .wireframe-box {
        width: 96vw;  /* Covers 96% of PC screen width */
        height: 92vh; /* Covers 92% of PC screen height */
        background: rgba(255, 255, 255, 0.1); /* Transparent white */
        backdrop-filter: blur(20px); /* The "Glass" effect 💎 */
        -webkit-backdrop-filter: blur(20px);
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        border-radius: 25px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
    }

    /* 3. Cursive Title */
    .title {
        font-family: 'Brush Script MT', cursive; /* Elegant cursive font 🖋️ */
        font-size: clamp(30px, 5vw, 55px);
        color: white;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        margin: 0 0 5px 0;
    }

    .subtitle {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.7);
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding-bottom: 15px;
        margin-bottom: 40px;
    }

    /* 4. Remove Underlines from Links */
    a {
        text-decoration: none; /* No more blue lines! 🚫 */
    }

    /* 5. Responsive Card Layout */
    .cards-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 25px;
        flex-grow: 1;
    }

    .card {
        /* Basic tag for background image as requested */
        background-image: linear-gradient(rgba(110, 0, 207, 0.5), rgba(110, 0, 207, 0.5)), url('ADD_YOUR_IMAGE_LINK_HERE');
        /* COMMENT: Change 'ADD_YOUR_IMAGE_LINK_HERE' to your image URL! */
        background-size: cover;
        background-position: center;
        background-color: #6e00cf;
        
        border-radius: 20px;
        color: #ffffff;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 18px;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: transform 0.3s ease;
        box-sizing: border-box;
    }

    .card:hover {
        transform: scale(1.05); /* Card pops out on hover */
        background-color: #a733e8;
    }

    button {
        margin-top: 15px;
        border-radius: 30px;
        border: none;
        padding: 10px 25px;
        cursor: pointer;
        background: white;
        color: #6e00cf;
        font-weight: bold;
    }

    /* Mobile logic - Adjusts size for phones */
    @media (max-width: 600px) {
        .wireframe-box {
            height: auto;
            padding: 20px;
            margin: 10px;
        }
    }
    </style>
</head>
<body>

    <div class="wireframe-box">
        
        <div class="title">After class 12</div>
        <div class="subtitle">completed grades</div>

        <div class="cards-row">
            <a href="aboutbiogroup.html">
                <div class="card">
                    bio-maths<br>group
                    <button>Click me</button>
                </div>
            </a>
            
            <a href="aboutcomputergroup.html">
                <div class="card">
                    computer<br>group
                    <button>Click me</button>
                </div>
            </a>
            
            <a href="aboutpuresciencegroup.html">
                <div class="card">
                    science<br>group
                    <button>Click me</button>
                </div>
            </a>
            
            <a href="commercegroup.html">
                <div class="card">
                    commerce<br>group
                    <button>Click me</button>
                </div>
            </a>
        </div>

    </div>

</body>
</html>
