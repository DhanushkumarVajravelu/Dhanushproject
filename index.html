<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhanush project</title>
    <style>
    /* 1. Background Setup */
	
	
    body {
      background-image: url('https://www.shutterstock.com/shutterstock/videos/1008944816/thumb/1.jpg?ip=x480');
      background-size: cover;
      background-attachment: fixed;
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center; 
      align-items: center;
      min-height: 100vh; /* Forces body to be full screen height */
      overflow-x: hidden;
    }

    /* 2. The Dynamic Glass Box */
    .wireframe-box {
        /* This makes it cover the PC screen leaving a small gap */
        width: 96vw;  /* 96% of screen width */
        height: 92vh; /* 92% of screen height */
        
        background: rgba(255, 255, 255, 0.1); /* Very transparent */
        backdrop-filter: blur(20px); /* Heavy glass blur 💎 */
        -webkit-backdrop-filter: blur(20px);
        
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        border-radius: 25px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
    }

    /* 3. Cursive Title */
    .title {
        font-family: 'Brush Script MT', cursive;
        font-size: clamp(30px, 5vw, 55px); /* Grows with screen size! 🖋️ */
        color: white;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        margin: 0 0 10px 0;
    }

    .subtitle {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.7);
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding-bottom: 15px;
        margin-bottom: 40px;
    }

    /* 4. Grid Layout (Best for Phone & PC) */
    .cards-row {
        display: grid;
        /* PC: 4 columns | Tablet: 2 columns | Phone: 1 column */
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 25px;
        flex-grow: 1; /* Makes row fill the height of the box */
    }

    .card {
        /* Add Background Image here! 🖼️ */
        background-image: linear-gradient(rgba(110, 0, 207, 0.5), rgba(110, 0, 207, 0.5)), url('YOUR_IMAGE_URL');
        /* COMMENT: Replace YOUR_IMAGE_URL with your link. The 'linear-gradient' makes text readable. */
        
        background-size: cover;
        background-position: center;
        background-color: #6e00cf;

        border-radius: 20px;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: 0.3s ease;
    }

    .card:hover {
        transform: scale(1.05); /* Slightly grows when you point at it */
        background-color: #a733e8;
    }

    button {
        margin-top: 15px;
        border-radius: 30px;
        border: none;
        padding: 10px 25px;
        cursor: pointer;
        background: white;
        color: #6e00cf;
        font-weight: bold;
        font-size: 16px;
    }

    /* Responsive adjustment for small phones */
    @media (max-width: 600px) {
        .wireframe-box {
            height: auto; /* Let it grow tall on phones */
            padding: 20px;
        }
        .title { font-size: 35px; }
    }
    </style>
</head>
<body>

    <div class="wireframe-box">
        
        <div class="title">Education ideas</div>
        
        <div class="subtitle">completed grades</div>

        <div class="cards-row">
            <div id="10" class="card">
                10th<br>ideas
                <a href="10thpage.html"><button>Click me</button></a>
            </div>
            
            <div id="12" class="card">
                12th<br>ideas
                <a href="12thpage.html"><button>Click me</button></a>
            </div>
            
            <div id="college" class="card">
 High<br>degree
                              <a href="college.html"> <button>Click me</button></a>
            </div>
            
            <div id="author" class="card">
                about<br>authors
                <a href="authourslastpage.html"><button>Click me</button></a>
            </div>
        </div>

    </div>

</body>
</html>
